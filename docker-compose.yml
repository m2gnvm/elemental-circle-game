services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: elemental_postgres
    environment:
      POSTGRES_DB: elemental_circle
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameuser -d elemental_circle"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: elemental_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  app:
    build: .
    container_name: elemental_app
    environment:
      DATABASE_URL: postgresql://gameuser:gamepass123@postgres:5432/elemental_circle
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-secret-key-change-in-production-elemental-circle-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ALLOWED_HOSTS: '["*"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:





