services:
  # FastAPI Application — exposed at ec-api.kamilstankowski.pl via Coolify
  # Database and Redis are managed separately in Coolify (not bundled here).
  app:
    build: .
    container_name: elemental_app
    environment:
      # Set these in Coolify's env var UI — values come from managed DB/Redis
      DATABASE_URL:                 ${DATABASE_URL:-postgresql://gameuser:gamepass123@localhost/elemental_circle}
      REDIS_URL:                    ${REDIS_URL:-redis://localhost:6379}
      SECRET_KEY:                   ${SECRET_KEY:-change-me-in-production}
      ALGORITHM:                    HS256
      ACCESS_TOKEN_EXPIRE_MINUTES:  ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      # In production: '["https://elemental-circle.kamilstankowski.pl"]'
      ALLOWED_HOSTS:                ${ALLOWED_ORIGINS:-'["*"]'}
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Flutter Web UI — exposed at elemental-circle.kamilstankowski.pl via Coolify
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The browser talks directly to the API domain.
        # Set API_URL / API_WS_URL in Coolify's env var UI before building.
        BASE_URL:    ${API_URL:-http://localhost:8000}
        WS_BASE_URL: ${API_WS_URL:-ws://localhost:8000}
    container_name: elemental_frontend
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped
