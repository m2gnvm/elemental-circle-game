server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Flutter SPA ──────────────────────────────────────────────────────────
    # All non-asset paths fall back to index.html so Flutter's router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend REST API proxy ────────────────────────────────────────────────
    # Browser calls /api/... → Nginx forwards to the backend container
    location /api/ {
        proxy_pass         http://app:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── WebSocket proxy ───────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass             http://app:8000/ws/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # ── Caching for Flutter's content-hashed assets ───────────────────────────
    location ~* \.(js|css|png|jpg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the entry-point
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
