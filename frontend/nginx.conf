server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS — resolves container names at request time,
    # not at startup, so Nginx boots even if the backend isn't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Flutter SPA ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend REST API proxy (internal) ────────────────────────────────────
    location /api/ {
        set $backend "elemental-app";
        proxy_pass         http://$backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── WebSocket proxy (internal) ────────────────────────────────────────────
    location /ws/ {
        set $backend "elemental-app";
        proxy_pass             http://$backend:8000/ws/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # ── Caching for Flutter's content-hashed assets ───────────────────────────
    location ~* \.(js|css|png|jpg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
